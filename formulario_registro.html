<!doctype html>
<html lang="en" class="h-100">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AllCursos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="d-flex flex-column h-100">
    <header data-bs-theme="dark">
      <nav
        class="navbar navbar-expand-lg bg-body-tertiary fixed-top"
        aria-label="Thirteenth navbar example"
      >
        <div class="container-fluid">
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarsExample11"
            aria-controls="navbarsExample11"
            aria-expanded="true"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div
            class="navbar-collapse d-lg-flex justify-content-between collapse show"
            id="navbarsExample11"
          >
            <ul class="navbar-nav fw-bold col-lg-6">
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="index.html"
                  >Inicio</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="login.html">Iniciar Sesión</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="formulario_registro.html"
                  >Registrate</a
                >
              </li>

              <li class="nav-item active">
                <span class="nav-link" id="usuarioNombre"></span>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    r>
    <main>
      <section
        class="container-fluid d-flex justify-content-center align-items-center"
      >
        <div class="container col-xl-10 col-xxl-8 px-4 py-5">
          <div class="row align-items-center g-lg-5 py-5">
            <div class="col-md-10 mx-auto col-lg-6">
              <form
                class="p-4 p-md-4 border rounded-3 bg-body-tertiary"
                id="formRegistro"
              >
                <div class="row">
                  <div class="col-sm-12">
                    <label for="regRol" class="form-label fw-bold"
                      >¿Cómo desea registrarse?</label
                    >
                    <select class="form-select" name="rol" id="regRol" required>
                      <option value="" disabled selected>
                        Seleccione una opción...
                      </option>
                      <option value="ciudadano">Ciudadano (Particular)</option>
                      <option value="representante">
                        Institución / Organismo (Representante)
                      </option>
                    </select>
                  </div>

                  <div id="camposFormulario" class="d-none row g-3 m-0 p-0">
                    <div class="col-sm-12">
                      <label for="nombre" class="form-label">Nombres</label>
                      <input
                        type="text"
                        class="form-control"
                        id="nombre"
                        placeholder="Nombre"
                      />
                    </div>

                    <div class="col-sm-12">
                      <label for="apellido" class="form-label">Apellido</label>
                      <input
                        type="text"
                        class="form-control"
                        id="apellido"
                        placeholder="Apellido"
                      />
                    </div>

                    <div class="col-sm-12">
                      <label for="email" class="form-label">Email</label>
                      <input
                        type="email"
                        class="form-control"
                        id="email"
                        placeholder="dfr17@gmail.com"
                      />
                    </div>

                    <div class="col-sm-12">
                      <label for="password" class="form-label"
                        >Contraseña</label
                      >
                      <input
                        type="password"
                        class="form-control"
                        id="password"
                        placeholder="Mínimo 6 caracteres"
                      />
                    </div>

                    <div id="camposCiudadano" class="d-none row g-3 m-0 p-0">
                      <div class="col-sm-12">
                        <label for="dni" class="form-label">Dni</label>
                        <input
                          type="text"
                          class="form-control"
                          id="dni"
                          placeholder="DNI"
                        />
                      </div>
                      <div class="col-sm-12">
                        <label for="address" class="form-label"
                          >Dirección</label
                        >
                        <input
                          type="text"
                          class="form-control"
                          id="address"
                          placeholder="B° Obrero, salta 1250"
                        />
                      </div>
                    </div>

                    <div id="camposInstitucion" class="d-none row g-3 m-0 p-0">
                      <div class="col-sm-12">
                        <label for="institucionNombre" class="form-label"
                          >Nombre de la Institución / Organismo</label
                        >
                        <input
                          type="text"
                          class="form-control"
                          id="institucionNombre"
                          placeholder="Ej: Instituto de Formación Profesional"
                        />
                      </div>
                      <div class="col-sm-12">
                        <label for="cuit" class="form-label"
                          >CUIT de la Institución</label
                        >
                        <input
                          type="text"
                          class="form-control"
                          id="cuit"
                          placeholder="Ej: 30-12345678-9"
                        />
                      </div>
                    </div>

                    <div class="d-flex justify-content-center w-100">
                      <button class="btn btn-primary mt-3" type="submit">
                        Registrarme
                      </button>
                    </div>

                    <div id="msjRegistro"></div>
                  </div>
                </div>

                <hr class="my-4" />
                <small class="text-body-secondary"
                  >Al hacer click en registrarme acepta los
                  <a href="#">términos y condiciones</a> de uso
                </small>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer class="text-white bg-black py-3 mt-auto">
      <div class="container text-center">
        <p class="mb-0">&copy; AllCursos 2026</p>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="assets/js/login.js"></script>
  </body>
</html>
