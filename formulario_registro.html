    <meta charset="UTF-8" />

  <body class="d-flex flex-column h-100">
    <header data-bs-theme="dark">
      <nav
        class="navbar navbar-expand-lg bg-body-tertiary fixed-top"

            data-bs-toggle="collapse"
            data-bs-target="#navbarsExample11"
            aria-controls="navbarsExample11"
            aria-expanded="true"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div
            class="navbar-collapse d-lg-flex justify-content-between collapse show"
            id="navbarsExample11"
          >
            <ul class="navbar-nav col-lg-6">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#"
                  >Inicio</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="login.html">Iniciar Sesión</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="formulario_registro.html"
                  >Registrate</a
                >
              </li>
            </ul>
            <div class="col-lg-4">
              <form class="d-flex" role="search" id="formBuscar">
                <input
                  class="form-control me-2"
                  type="search"
                  placeholder="Buscar"
                  aria-label="Search"
                  name="terminoBusqueda"
                  id="terminoBusqueda"
                />

                  Buscar

    r>
    <main>
      <section class="py-5 container">
        <div class="album py-5">
          <div class="container">
            <div class="row g-3 d-flex justify-content-center" id="cardLogin">
              <div class="col-6">
                <form class="needs-validation" novalidate="">
                  <div class="row g-3">
                    <div class="col-sm-6">
                      <label for="nombre" class="form-label">Nombres</label>
                      <input
                        type="text"
                        class="form-control"
                        id="nombre"
                        placeholder="Nombre"
                        value=""
                        required=""
                      />
                      <div class="invalid-feedback">
                        Valid first name is required.
                      </div>
                    </div>
                    <div class="col-sm-6">
                      <label for="lastName" class="form-label">Apellido</label>
                      <input
                        type="text"
                        class="form-control"
                        id="apellido"
                        placeholder="apellido"
                        value=""
                        required=""
                      />
                      <div class="invalid-feedback">
                        Valid last name is required.
                      </div>
                    </div>
                    <div class="col-sm-6">
                      <label for="dni" class="form-label">Dni</label>
                      <div class="input-group has-validation">
                        <input
                          type="text"
                          class="form-control"
                          id="dni"
                          placeholder="DNI"
                          required=""
                        />
                        <div class="invalid-feedback">
                          Your username is required.
                        </div>
                      </div>
                    </div>
                    <div class="col-sm-6">
                      <label for="email" class="form-label">Email</label>
                      <input
                        type="email"
                        class="form-control"
                        id="email"
                        placeholder="dfr17@gmail.com"
                      />
                      <div class="invalid-feedback">
                        Please enter a valid email address for shipping updates.
                      </div>
                    </div>
                    <div class="col-sm-12">
                      <label for="address" class="form-label">Dirección</label>
                      <input
                        type="text"
                        class="form-control"
                        id="address"
                        placeholder="B° Obrero, salta 1250"
                        required=""
                      />
                      <div class="invalid-feedback">
                        Please enter your shipping address.
                      </div>
                    </div>
                  </div>

                  <div class="d-flex justify-content-center">
                    <button class="btn btn-primary mt-5" type="submit">
                      Registrarme
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer class="text-white bg-black py-3 mt-auto">
      <div class="container text-center">
        <p class="mb-0">&copy; AllCursos 2026</p>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

      crossorigin="anonymous"
    ></script>

    <script src="assets/js/app.js"></script>
  </body>
</html>
