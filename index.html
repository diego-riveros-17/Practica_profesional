<!doctype html>
<html lang="en" class="h-100">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AllCursos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="d-flex flex-column h-100" id="page-container-1">
    <header data-bs-theme="dark">
      <nav
        class="navbar navbar-expand-lg bg-body-tertiary fixed-top"
        aria-label="Thirteenth navbar example"
      >
        <div class="container-fluid">
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarsExample11"
            aria-controls="navbarsExample11"
            aria-expanded="true"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div
            class="navbar-collapse d-lg-flex justify-content-between collapse show"
            id="navbarsExample11"
          >
            <ul class="navbar-nav fw-bold col-lg-6">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="index.html"
                  >Inicio</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="login.html">Iniciar Sesión</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="formulario_registro.html"
                  >Registrate</a
                >
              </li>

              <li class="nav-item">
                <span class="nav-link" id="usuarioNombre"></span>
              </li>
            </ul>
            <div class="col-lg-4">
              <form class="d-flex" role="search" id="formBuscar">
                <input
                  class="form-control me-2"
                  type="search"
                  placeholder="Buscar"
                  aria-label="Search"
                  name="terminoBusqueda"
                  id="terminoBusqueda"
                />
              </form>
            </div>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <section>
        <div
          id="carouselExample"
          class="carousel slide carousel-fade"
          data-bs-ride="carousel"
        >
          <div class="carousel-inner">
            <!-- Item Activo -->
            <div class="carousel-item active">
              <!-- Tu imagen limpia de fondo -->
              <img
                src="assets/img/infocursos1.png"
                class="d-block w-100"
                alt="InfoCursos"
              />

              <!-- Capa contenedora alineada con Flexbox nativo de Bootstrap -->
              <div class="carousel-caption d-flex align-items-center">
                <div class="container">
                  <div class="row">
                    <!-- Limitamos el ancho del texto a 6 columnas en pantallas grandes -->
                    <div class="col-lg-6 col-md-8 col-12 text-start text-white">
                      <h1 class="display-3 fw-bold mb-3 text-uppercase">
                        ¡BIENVENIDO A
                      </h1>
                      <h1
                        class="display-3 fw-bold mb-3 text-uppercase text-warning"
                      >
                        INFOCURSOS!
                      </h1>
                      <p class="lead display-6 fw-bolder mb-4">
                        Conoce las últimas ofertas de cursos de formación
                        profesional, disponibles.
                      </p>
                      <a href="#cursos" class="btn btn-outline-gold btn-lg"
                        >Explora los Cursos Disponibles</a
                      >
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="py-3 text-center container" id="cursos">
        <div class="album py-5">
          <div class="container">
            <div class="row g-3" id="cardCursos"></div>
          </div>
        </div>
      </section>
    </main>
    <footer class="text-white bg-black py-3 mt-auto">
      <div class="container text-center">
        <p class="mb-0">&copy; AllCursos 2026</p>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="assets/js/app.js"></script>
  </body>
</html>
