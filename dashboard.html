<!doctype html>
<html lang="es" class="h-100">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Panel de Control - AllCursos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="d-flex flex-column h-100 bg-light">
    <main class="container my-5 pt-5">
      <div
        class="p-4 mb-4 bg-white rounded-3 shadow-sm border-start border-primary border-4"
      >
        <h2 id="saludoUsuario">Cargando Panel...</h2>
        <p class="text-muted mb-0">
          Desde aquí puedes gestionar todas tus actividades en la plataforma.
        </p>
      </div>

      <div id="dashCiudadano" class="d-none">
        <div class="row">
          <div class="col-md-4 mb-4">
            <div class="card shadow-sm border-0">
              <div class="card-body">
                <h5 class="card-title fw-bold">
                  <i class="bi bi-person-circle me-2"></i>Mis Datos
                </h5>
                <hr />
                <div id="infoPerfilCiudadano"></div>
              </div>
            </div>
          </div>
          <div class="col-md-8 mb-4">
            <div class="card shadow-sm border-0">
              <div class="card-body">
                <h5 class="card-title fw-bold">
                  <i class="bi bi-journal-bookmark-fill me-2"></i>Mis Cursos
                  Inscritos
                </h5>
                <div class="table-responsive mt-3">
                  <table class="table table-hover align-middle">
                    <thead class="table-dark">
                      <tr>
                        <th>Curso</th>
                        <th>Institución</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                      </tr>
                    </thead>
                    <tbody id="tablaInscripcionesCiudadano"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="dashRepresentante" class="d-none">
        <div class="row mb-4" id="metricasRepresentante"></div>

        <div class="row">
          <div class="col-md-12">
            <div class="card shadow-sm border-0 mb-4">
              <div class="card-body">
                <div
                  class="d-flex justify-content-between align-items-center flex-wrap gap-2"
                >
                  <h5 class="card-title fw-bold mb-0">
                    <i class="bi bi-building-gear me-2"></i>Cursos Ofertados por
                    tu Institución
                  </h5>
                  <button
                    class="btn btn-primary btn-sm"
                    data-bs-toggle="modal"
                    data-bs-target="#modalNuevoCurso"
                  >
                    <i class="bi bi-plus-circle me-1"></i> Publicar Nuevo Curso
                  </button>
                </div>

                <div class="table-responsive mt-3">
                  <table class="table table-hover align-middle">
                    <thead class="table-dark">
                      <tr>
                        <th>Curso</th>
                        <th>Cupos</th>
                        <th>Inscritos</th>
                        <th>Acciones</th>
                      </tr>
                    </thead>
                    <tbody id="tablaCursosRepresentante"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="assets/js/dashboard.js"></script>
  </body>
</html>
