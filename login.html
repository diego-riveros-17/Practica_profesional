<!doctype html>
<html lang="en" class="h-100">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AllCursos</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="d-flex flex-column h-100">
    <header data-bs-theme="dark">
      <nav
        class="navbar navbar-expand-lg bg-body-tertiary fixed-top"
        aria-label="Thirteenth navbar example"
      >
        <div class="container-fluid">
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarsExample11"
            aria-controls="navbarsExample11"
            aria-expanded="true"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div
            class="navbar-collapse d-lg-flex justify-content-between collapse show"
            id="navbarsExample11"
          >
            <ul class="navbar-nav col-lg-6">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="index.html"
                  >Inicio</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="login.html">Iniciar Sesión</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="formulario_registro.html"
                  >Registrate</a
                >
              </li>
            </ul>
            <div class="col-lg-4">
              <form class="d-flex" role="search" id="formBuscar">
                <input
                  class="form-control me-2"
                  type="search"
                  placeholder="Buscar"
                  aria-label="Search"
                  name="terminoBusqueda"
                  id="terminoBusqueda"
                />
                <button class="btn btn-outline-success" type="submit">
                  Buscar
                </button>
              </form>
            </div>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <section class="py-5 text-center container">
        <div class="album py-5">
          <div class="container">
            <div class="row g-3 d-flex justify-content-center" id="cardLogin">
              <div class="col-3">
                <form>
                  <img
                    class="mb-4"
                    src="/docs/5.3/assets/brand/bootstrap-logo.svg"
                    alt=""
                    width="72"
                    height="57"
                  />
                  <!-- <h1 class="h3 mb-3 fw-normal">Inicio de Sesión</h1> -->
                  <div class="form-floating">
                    <input
                      type="email"
                      class="form-control"
                      id="floatingInput"
                      placeholder="dfr17@gmail.com"
                    />
                    <label for="floatingInput">Email o Dni</label>
                  </div>
                  <div class="form-floating my-3">
                    <input
                      type="password"
                      class="form-control"
                      id="password"
                      placeholder="Contraseña"
                    />
                    <label for="password">Contraseña</label>
                  </div>
                  <div class="form-check text-start my-3">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      value="remember-me"
                      id="checkDefault"
                    />
                    <label class="form-check-label" for="checkDefault">
                      Recordarme
                    </label>
                  </div>
                  <button class="btn btn-primary w-100 mt-5 py-2" type="submit">
                    Iniciar Sesión
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer class="text-white bg-black py-3 mt-auto">
      <div class="container text-center">
        <p class="mb-0">&copy; AllCursos 2026</p>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="assets/js/app.js"></script>
  </body>
</html>
